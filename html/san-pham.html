<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sản phẩm — K7 MOTO</title>
  <link rel="icon" href="../img/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="wrap nav">
      <a href="../index.html" class="nav-logo"><img src="../img/logo.svg" alt="K7 MOTO"></a>
      <nav class="nav-links">
        <a href="../index.html">Trang chủ</a>
        <a href="san-pham.html" class="active">Sản phẩm</a>
        <a href="gioi-thieu.html">Giới thiệu</a>
        <a href="lien-he.html">Liên hệ</a>
      </nav>
      <div class="nav-actions">
        <a href="san-pham.html" class="nav-cart" title="Giỏ hàng">🛒<span class="cart-count">0</span></a>
        <button class="nav-toggle" aria-label="Mở menu"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <div class="wrap breadcrumb"><a href="../index.html">Trang chủ</a> / Sản phẩm</div>

  <section class="section" style="padding-top:10px;">
    <div class="wrap">
      <div class="section-head">
        <div>
          <p class="eyebrow">6 mẫu xe · 150–155cc</p>
          <h1 class="section-title">Tất cả sản phẩm</h1>
        </div>
        <p class="section-sub">Lọc theo dòng xe hoặc sắp xếp theo giá để tìm chiếc côn tay phù hợp với bạn.</p>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" data-category="all">Tất cả</button>
        <button class="filter-btn" data-category="naked">Naked bike</button>
        <button class="filter-btn" data-category="fullfairing">Full fairing</button>
        <select class="sort-select" aria-label="Sắp xếp">
          <option value="default">Sắp xếp: Mặc định</option>
          <option value="price-asc">Giá: Thấp đến cao</option>
          <option value="price-desc">Giá: Cao đến thấp</option>
          <option value="cc-desc">Dung tích xy-lanh</option>
        </select>
      </div>

      <div class="row row-cols-1 row-cols-4" id="product-list"></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="wrap">
      <div class="footer-bottom">
        <span>© 2026 K7 MOTO. Đồ án môn học — không phải cửa hàng thật.</span>
        <span>Thiết kế bởi Nguyễn Kiều Quốc Tâm</span>
      </div>
    </div>
  </footer>

  <script src="../js/script.js"></script>
  <script>
    // Nếu đến từ liên kết danh mục ở trang chủ (?loai=naked / fullfairing), tự bấm bộ lọc tương ứng
    const initialCat = new URLSearchParams(window.location.search).get("loai");
    if (initialCat) {
      window.addEventListener("DOMContentLoaded", () => {
        const btn = document.querySelector(`.filter-btn[data-category="${initialCat}"]`);
        if (btn) btn.click();
      });
    }
  </script>
</body>
</html>
